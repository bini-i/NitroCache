name: NitroCache Performance Profiling

on:
  push:
    branches: [ main, SetupCICD ]
  pull_request:
    branches: [ main, SetupCICD ]

jobs:
  profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Async Profiler
        run: |
          wget https://github.com/async-profiler/async-profiler/releases/download/v3.0/async-profiler-3.0-linux-x64.tar.gz
          tar -xzf async-profiler-3.0-linux-x64.tar.gz
          echo "PROFILER_LIB=$(pwd)/async-profiler-3.0-linux-x64/lib/libasyncProfiler.so" >> $GITHUB_ENV

      - name: Build NitroCache
        run: mvn clean package -DskipTests

      - name: Run Benchmarks with Profiler
        run: |
          sudo sysctl -w kernel.perf_event_paranoid=1
          sudo sysctl -w kernel.kptr_restrict=0
          
          RESULTS_PATH=$(pwd)/profiler-results
          mkdir -p $RESULTS_PATH
          java -jar ./nitro-benchmarks/target/benchmarks.jar \
            -f 1 -wi 2 -i 5 \
            -prof "async:libPath=${{ env.PROFILER_LIB }};output=flamegraph;dir=profiler-results"
          
          echo "Checking for generated files in $RESULTS_PATH:"
          ls -R $RESULTS_PATH
          
          echo "Files created:"
          find $(pwd)/profiler-results -type f

      - name: Upload Flamegraphs
        uses: actions/upload-artifact@v4
        with:
          name: nitrocache-flamegraphs
          path: profiler-results/**
          if-no-files-found: error